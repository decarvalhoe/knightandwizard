  - id: armure-partielle
    name: Armure partielle
    effect: >-
      Si dans sa touche (après une éventuelle esquive), un adversaire ne dépasse pas le score d’armure partielle du
      personnage, son coups sera alors dévier automatiquement dans une partie d’armure que possède le personnage (la
      plus proche par rapport au coups donné). Par exemple, si un personnage à un score de 2 en armure partielle et
      qu’on la touche avec 3 réussites. Si celle-ci fait une réussite d’esquive, ses deux point d’armure partielle
      contre alors les deux réussites restante de son attaquant. Le coup sera alors dévié dans une pièce d’armure (ce
      pourrait aussi être dans un pendentif, ou autre).

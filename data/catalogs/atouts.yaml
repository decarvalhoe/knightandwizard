  - id: familier
    name: Familier
    effect: >-
      Le personnage est aidé d’une créature qui peut prendre n’importe quelle forme. Ce suivant magique doit posséder
      une feuille de personnage dans laquelle son possesseurs pourra dépenser son niveau x 100 en points d’expérience
      selon les pondération du jeu (Attributs = NAx5, compétence = NAx3, Vitalité = 10, etc.) Les limites physique ne
      s’appliquent pas aux familiers. Leurs facteurs de vitesse et de volonté de base sont de 8. Les familiers ne
      peuvent avoir de points dans une connaissance (mathématique, géographie, etc.) que le magicien ne possède pas. Ils
      ne possèdent ni race, ni catégorie (ils sont donc toujours considéré comme niveau 1), ni orientation, ni classe
      (et n’ont donc pas accès aux atouts qui y sont relatifs.) Ils ont toutefois le droit d’avoir des atouts
      (considérés comme atouts de race). Pour ajouter un atout à son familier, un magicien doit dépenser la valeur de
      l’atout choisit divisé par 10. Par exemple, un familier hiboux ne pourra voler que si son magicien investit 200
      points (valeur de l’atout = 2000) dans cet atout. La prise d’handicap alloue la valeur de celui-ci divisé par 10
      en points supplémentaire au familier. Les familiers doivent impérativement avoir au minimum 1 point de vitalité. A
      chaque passage de niveau, le familier renaît et ses nouveau points peuvent lui être attribués. Il peut décider de
      conserver sa forme ou de la modifier pour une autre au choix du personnage, c’est aussi comme cela qu’il est
      possible de récupérer un familier mort.
    value: 500
    activation: permanent
    scope: orientation
    source_refs:
      - path: data/legacy/web-scraped/documents/atouts/index.md
        sha256: b38cdafddc2e1503d7d139ced3dcbfa2455b15b5d7a0e5cf16584654b08e79cb
        ref: entry:familier

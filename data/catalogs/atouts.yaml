  - id: art-occulte
    name: Art occulte
    effect: >-
      Le personnage peut choisir un sort de magie noire qu’il ajoute à sa feuille de personnage, comme s'il était
      magicien. Ce sort doit, bien sur être appris pour pouvoir être lancé. Le personnage débute avec un score de 0 dans
      le sort choisit (il peut donc le lancé juste avec ses points d’intelligence au début, puis payer des points
      supplémentaire dans le sort avec ses points d’expériences). Si le personnage ne possédait pas de point d’énergie,
      il débute avec un total de 40 points. Il peut aux mêmes conditions que les magiciens faire évoluer cette limite.
      Cet atout peut être cumulé pour permettre l’utilisation de plusieurs sorts.
    value: 2000
    activation: permanent
    scope: neutre

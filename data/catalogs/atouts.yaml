      matériels (pas d’ombre ou de lumière par exemple). L’élément reconnaît dans le personnage l'un des siens. Ainsi,
      cet élément se tordra, se déformera, se déplacera, etc pour aider le personnage. Par exemple un fils du feu
      passera dans des flammes sans être brûler car celles-ci s’écarteront de lui pour ne pas lui faire de mal (ce qui

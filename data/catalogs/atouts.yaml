  - id: anticipation-magique
    name: Anticipation magique
    effect: >-
      Le magicien peut incanter un sort sans le lancer, celui-ci est alors anticipé. Une fois le sort anticipé, le
      magicien peut le lancer à tout moment en 1 DT. Le magicien peut anticiper 1 sort par niveau en anticipation
      magique. Les sorts sont visibles et accompagnent le magicien, leurs apparences et comportement dépendent de leurs
      effets. Un sort anticipé reste en suspens jusqu’à ce qu’il soit lancé. Si le lanceur de sort s’endort, perd
      connaissance ou meurt, le sort est alors libéré sur une cible aléatoire si celui en requiert une.

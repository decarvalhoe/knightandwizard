# === CARTE DU MONDE GLOBAL ===

world_map:
  - id: terres_oubliees
    name: "Les Terres Oubliées (carte du monde)"
    file: "site/download/map/terres-oubliees.jpg"
    type: world_map
    resolution: high
    description: |
      Carte du monde global K&W. Confirme la disposition géographique des 18 nations + dévoile
      des régions absentes de nations.yaml :
      - Royaume du Chaos (frontière nord)
      - Onarit (nord-est, derrière les Montagnes Grises)
      - Lounaxill (est, entre Cortega et Sombre Monde)
      - Montagnes Grises (chaîne nord-est)
      - L'Île aux Basilics (île au sud)
      - Les Terres Sauvages (sud-est, étendue sauvage)
    regions_visible:
      - terres_du_nord     # nord
      - foret_de_tyrkan    # nord
      - empire             # ouest
      - fauche_le_vent     # centre-nord
      - alteria            # centre
      - portes_d_azrak     # centre (entre Cortega et Alteria)
      - aderand            # ouest (port)
      - enorie             # ouest
      - haut_royaume       # sud-ouest
      - cortega            # sud-ouest
      - dundoria           # sud-est
      - yonkado            # sud-est
      - irtanie            # est
      - blanc_royaume      # est (côté Lounaxill)
      - monde_sombre       # est extrême
      - detre              # nord-est
      - grand_desert       # sud-est centre
      - landes_desertiques # sud
      - terres_sauvages    # sud-est
      - royaume_du_chaos   # nord (NOUVEAU)
      - onarit             # nord-est (NOUVEAU)
      - lounaxill          # est (NOUVEAU, mentionné dans poisons.md)
      - montagnes_grises   # nord-est (NOUVEAU)
      - ile_aux_basilics   # île sud (NOUVEAU)
    metadata: { source: web, format: jpg, version: 1 }

  - id: map_world_web
    name: "Carte du monde (web variant)"
    file: "site/img/maps/map-world.jpg"
    type: world_map
    notes: "Variante web, à comparer avec terres-oubliees.jpg"
    metadata: { source: web, format: jpg, version: 1 }


# Statut : 🟡 import auto, ambiguïtés à valider (cf. armes-ambiguites.md)

version: 1
metadata:
  source: paper
  imported_at: "2026-04-25"
  total_entries: 107
  ambiguities_count: 8

# Notation legendaire :
# damage_formula:
#   "F+N"           = Force + bonus arme (mêlée standard)
#   "N+munition"    = bonus arme + munition (arme à distance, ex. arc)
#   "F"             = Force seule, pas de bonus (chaîne, sarbacane, scalpel)
#   "F+N+1/tête"    = formule paramétrique (goupillon)
# damage_type:
#   P = Perforant, T = Tranchant, C = Contendant, E = Énergétique
#   "C/P" = au choix (R-9.7), "+1 X" = bonus typé additionnel
# weight_kg:
#   nombre = poids unitaire en kg
#   "0.1/N" = poids 0.1 kg pour N pièces (munitions, lames de jet)
#   "0.8/1m" = poids 0.8 kg par mètre (chaîne)
#   0 = arme naturelle (crocs, griffe) ou poids négligeable

# inferred = valeurs déduites par le moteur (R-10.19), à valider en édition admin :
#   - range (pour weapon_ranged)
#   - min_strength (ceil(weight_kg / 1.5))
#   - area_attack pattern
#   - durability max (selon matériau supposé)


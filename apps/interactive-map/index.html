<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knight and Wizard — Carte interactive</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>Les Terres Oubliées</h1>
      <div id="search-container">
        <input type="text" id="search" placeholder="Rechercher une nation, ville..." autocomplete="off">
        <ul id="search-results"></ul>
      </div>
      <nav id="layer-controls">
        <label><input type="checkbox" id="toggle-regions" checked> Frontières</label>
        <label><input type="checkbox" id="toggle-cities" checked> Villes</label>
        <label><input type="checkbox" id="toggle-routes"> Routes</label>
      </nav>
    </header>

    <main id="map-container">
      <div id="map"></div>
      <aside id="info-panel" class="hidden">
        <button id="info-close" aria-label="Fermer">×</button>
        <div id="info-content"></div>
      </aside>
    </main>

    <footer id="bottombar">
      <span class="status">Phase 2 axe A bis — MVP</span>
      <span class="counts">
        <span id="count-regions">0</span> régions ·
        <span id="count-cities">0</span> villes
      </span>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

# Villes extraites des cartes régionales — Phase 2 axe A bis
# Sources : 15 cartes JPG dans site/download/map/ (lecture visuelle)
# Date import : 2026-04-25

version: 1
metadata:
  source: visual_extraction_from_maps
  imported_at: "2026-04-25"
  total_cities_extracted: 280  # approximatif
  notes: |
    Extraction visuelle depuis les 15 cartes régionales JPG.
    Les noms peuvent contenir des fautes d'OCR — à valider.
    Les "portes" du territoire nain (Portes d'Azrak) sont des points fortifiés, pas des villes per se.
    Beaucoup de villages micro-localités sont juste indiqués par un nom sans détail.

# Schéma simple :
#   id: <slug>, name: <string>, parent_region: <region_id>
#   role: capital | major_city | town | village | landmark
#   notes: optionnel


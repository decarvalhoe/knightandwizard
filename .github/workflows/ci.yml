name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - staging
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Configure environment
        run: cp .env.example .env

      - name: Start devlab
        run: pnpm devlab:up

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Validate repository
        run: pnpm validate

      - name: Show devlab logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop devlab
        if: always()
        run: docker compose down --volumes --remove-orphans

  strict-canonical:
    name: Strict Canonical Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_name == 'staging' ||
      github.ref_name == 'main' ||
      github.base_ref == 'staging' ||
      github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run strict canonical gate
        run: pnpm canonical:check:strict

      - name: Cite canonical coverage report
        run: |
          {
            echo '## Canonical coverage report'
            echo
            echo 'Strict gate used `pnpm canonical:check:strict`.'
            echo
            cat docs/canonical/coverage-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload canonical coverage report
        uses: actions/upload-artifact@v4
        with:
          name: canonical-coverage-report
          path: docs/canonical/coverage-report.md
